<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鹅厂人格研究所</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f8f6ff;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.page{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:20px;animation:fadeIn .5s ease}
.page.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes barGrow{from{width:0}to{width:var(--pct)}}

/* Start Page */
.start-page{justify-content:center;text-align:center;background:linear-gradient(180deg,#ede9fe 0%,#f5f3ff 30%,#fdf2f8 70%,#fff1f2 100%);position:relative;overflow:hidden}
.start-page::before{content:'';position:absolute;top:-50px;left:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(196,181,253,.4),transparent 70%);border-radius:50%}
.start-page::after{content:'';position:absolute;bottom:40px;right:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(251,207,232,.4),transparent 70%);border-radius:50%}
.logo-wrap{margin-bottom:16px;animation:float 3s ease-in-out infinite;position:relative;z-index:1}
.logo-emoji{font-size:72px;filter:drop-shadow(0 4px 12px rgba(139,92,246,.2))}
.app-title{font-size:26px;font-weight:900;letter-spacing:1px;background:linear-gradient(135deg,#7c3aed,#db2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;position:relative;z-index:1}
.app-subtitle{font-size:14px;color:#6b7280;margin-bottom:36px;line-height:1.6;position:relative;z-index:1}
.start-btn{width:210px;height:54px;border:none;border-radius:27px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:2px;box-shadow:0 6px 20px rgba(139,92,246,.35);transition:all .3s;position:relative;z-index:1}
.start-btn:active{transform:scale(.95)}
.test-info{margin-top:28px;display:flex;gap:28px;justify-content:center;position:relative;z-index:1}
.info-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.info-num{font-size:20px;font-weight:800;color:#7c3aed}
.info-label{font-size:11px;color:#9ca3af}

/* Question Page */
.q-page{justify-content:flex-start;padding-top:0;background:#f8f6ff}
.progress-bar{width:100%;max-width:420px;height:6px;background:#e9e5f5;border-radius:3px;margin:16px auto 6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#8b5cf6,#ec4899);border-radius:3px;transition:width .4s ease}
.progress-text{font-size:12px;color:#9ca3af;text-align:center;margin-bottom:20px}
.q-card{width:100%;max-width:420px;flex:1;display:flex;flex-direction:column;animation:slideUp .4s ease}
.q-dimension{display:inline-block;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:600;margin-bottom:14px}
.q-text{font-size:18px;font-weight:700;line-height:1.5;margin-bottom:24px;color:#1f2937}
.options{display:flex;flex-direction:column;gap:10px}
.option-btn{width:100%;padding:15px 16px;border:2px solid #e9e5f5;border-radius:14px;background:#fff;color:#374151;font-size:14px;line-height:1.5;text-align:left;cursor:pointer;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.option-btn:active{transform:scale(.98)}
.option-btn.selected{border-color:#8b5cf6;background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(236,72,153,.08));color:#6d28d9;font-weight:600;box-shadow:0 2px 8px rgba(139,92,246,.15)}

/* Result Page */
.result-page{justify-content:flex-start;padding-top:0;position:relative;background:#f8f6ff}
.result-hero{width:100%;max-width:420px;text-align:center;padding-top:24px}
.result-badge{display:inline-block;padding:4px 16px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:12px}
.result-char-img{width:180px;height:180px;object-fit:cover;border-radius:20px;margin:0 auto 12px;display:block;box-shadow:0 8px 24px rgba(0,0,0,.1);animation:pop .6s ease}
.result-char-name{font-size:28px;font-weight:900;margin-bottom:2px}
.result-code{font-size:20px;font-weight:800;letter-spacing:3px;margin-bottom:2px}
.result-tag{font-size:15px;font-weight:600;margin-bottom:2px}
.result-name{font-size:13px;color:#6b7280;margin-bottom:16px}
.result-bar-wrap{width:100%;max-width:260px;margin:0 auto 28px}
.result-bar-outer{height:10px;background:#e9e5f5;border-radius:5px;overflow:hidden}
.result-bar-inner{height:100%;border-radius:5px;--pct:0%;animation:barGrow 1s ease .3s forwards}
.result-pct{font-size:13px;color:#9ca3af;margin-top:4px}
.result-section{width:100%;max-width:420px;margin-bottom:16px;background:#fff;border-radius:16px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.result-section-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.result-section-title::before{content:'';width:3px;height:16px;border-radius:2px}
.result-text{font-size:13px;line-height:1.9;color:#6b7280}
.result-text strong{font-weight:600}
.keywords{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.keyword-tag{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:600}
.result-actions{width:100%;max-width:420px;display:flex;gap:10px;margin:20px 0 36px}
.action-btn{flex:1;height:46px;border:none;border-radius:23px;font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:1px}
.action-btn:active{transform:scale(.95)}
.btn-primary{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;box-shadow:0 4px 14px rgba(139,92,246,.25)}
.btn-secondary{background:#fff;border:2px solid #e9e5f5;color:#6b7280}

/* Character themes */
.char-guguji{--c1:#f59e0b;--c2:#ea580c;--c3:#fef3c7;--cbg:linear-gradient(180deg,#fef9c3 0%,#fff7ed 50%,#f8f6ff 100%)}
.char-niuxiaoniu{--c1:#ec4899;--c2:#db2777;--c3:#fce7f3;--cbg:linear-gradient(180deg,#fdf2f8 0%,#fff1f2 50%,#f8f6ff 100%)}
.char-echangzhang{--c1:#3b82f6;--c2:#06b6d4;--c3:#dbeafe;--cbg:linear-gradient(180deg,#eff6ff 0%,#ecfeff 50%,#f8f6ff 100%)}
.char-xingmishu{--c1:#8b5cf6;--c2:#a855f7;--c3:#ede9fe;--cbg:linear-gradient(180deg,#f5f3ff 0%,#faf5ff 50%,#f8f6ff 100%)}
.char-shuaijingzhang{--c1:#d97706;--c2:#78716c;--c3:#fef3c7;--cbg:linear-gradient(180deg,#fffbeb 0%,#f5f5f4 50%,#f8f6ff 100%)}
.char-yibaojiang{--c1:#0ea5e9;--c2:#f97316;--c3:#e0f2fe;--cbg:linear-gradient(180deg,#f0f9ff 0%,#fff7ed 50%,#f8f6ff 100%)}
.char-madaidai{--c1:#f472b6;--c2:#fb7185;--c3:#fce7f3;--cbg:linear-gradient(180deg,#fdf2f8 0%,#fff1f2 50%,#f8f6ff 100%)}
.char-feifeiyan{--c1:#6366f1;--c2:#ef4444;--c3:#e0e7ff;--cbg:linear-gradient(180deg,#eef2ff 0%,#fef2f2 50%,#f8f6ff 100%)}
.char-huoyingli{--c1:#ea580c;--c2:#92400e;--c3:#ffedd5;--cbg:linear-gradient(180deg,#fff7ed 0%,#fef3c7 50%,#f8f6ff 100%)}
.char-daihaok{--c1:#7c3aed;--c2:#0891b2;--c3:#ede9fe;--cbg:linear-gradient(180deg,#f5f3ff 0%,#ecfeff 50%,#f8f6ff 100%)}

.result-page .result-hero{background:var(--cbg);border-radius:0 0 28px 28px;padding-bottom:20px}
.result-badge{background:var(--c3);color:var(--c1)}
.result-char-name{color:var(--c1)}
.result-code{color:var(--c2)}
.result-tag{color:var(--c1)}
.result-bar-inner{background:linear-gradient(90deg,var(--c1),var(--c2))}
.result-section-title::before{background:var(--c1)}
.keyword-tag{background:var(--c3);color:var(--c1)}
.q-dimension{background:var(--c3);color:var(--c1)}

.dim-0{--c3:#dbeafe;--c1:#3b82f6}.dim-1{--c3:#fce7f3;--c1:#ec4899}.dim-2{--c3:#fef3c7;--c1:#f59e0b}.dim-3{--c3:#d1fae5;--c1:#10b981}.dim-4{--c3:#fee2e2;--c1:#ef4444}.dim-5{--c3:#e0e7ff;--c1:#6366f1}.dim-6{--c3:#ede9fe;--c1:#8b5cf6}.dim-7{--c3:#e0f2fe;--c1:#0ea5e9}
</style>
</head>
<body>

<div class="page start-page active" id="startPage">
  <div class="logo-wrap"><div class="logo-emoji">🐧</div></div>
  <div class="app-title">鹅厂人格研究所</div>
  <div class="app-subtitle">测一测，你是鹅厂的哪只鹅？<br>10大专属人格 · 24道灵魂拷问 · MBTI风格解析</div>
  <button class="start-btn" id="startBtn">开始测试</button>
  <div class="test-info">
    <div class="info-item"><span class="info-num">24</span><span class="info-label">测试题</span></div>
    <div class="info-item"><span class="info-num">10</span><span class="info-label">人格类型</span></div>
    <div class="info-item"><span class="info-num">8</span><span class="info-label">测评维度</span></div>
  </div>
</div>

<div class="page q-page" id="questionPage">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText"></div>
  <div class="q-card">
    <div class="q-dimension" id="qDimension"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="qOptions"></div>
  </div>
</div>

<div class="page result-page" id="resultPage">
  <div class="result-hero">
    <div class="result-badge" id="resultBadge"></div>
    <img class="result-char-img" id="resultImg" src="" alt="">
    <div class="result-char-name" id="resultCharName"></div>
    <div class="result-code" id="resultCode"></div>
    <div class="result-tag" id="resultTag"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-bar-wrap">
      <div class="result-bar-outer"><div class="result-bar-inner" id="resultBar"></div></div>
      <div class="result-pct" id="resultPct"></div>
    </div>
  </div>
  <div class="result-section">
    <div class="result-section-title">✨ 人格闪光点</div>
    <div class="result-text" id="resultStrength"></div>
  </div>
  <div class="result-section">
    <div class="result-section-title">💭 性格小纠结</div>
    <div class="result-text" id="resultWeakness"></div>
  </div>
  <div class="result-section">
    <div class="result-section-title">🏷 专属关键词</div>
    <div class="keywords" id="resultKeywords"></div>
  </div>
  <div class="result-actions">
    <button class="action-btn btn-secondary" id="restartBtn">重新测试</button>
    <button class="action-btn btn-primary" id="shareBtn">分享结果</button>
  </div>
</div>

<script>
var DIMENSIONS = ['社交模式','恋爱观念','做事风格','消费习惯','情绪性格','处事原则','思维方式','生活作息'];

var QUESTIONS = [
  {dim:0, text:'朋友聚会上，你通常是——', opts:[
    {text:'全场串场的社交蝴蝶，每个圈子都能聊两句，最后大家都认识你了',p:'鹅厂长',s:'飞飞燕'},
    {text:'默默坐在角落观察所有人，偶尔被点到才说一句，但每句都在点上',p:'帅警长',s:'马呆呆'},
    {text:'跟最熟的那几个待一块，谁被冷落了你就去搭话暖场',p:'怡宝酱',s:'咕咕鸡'},

    {text:'各自独立但彼此支撑，不黏糊但有默契',p:'帅警长',s:'星秘书'}
  ]},
  {dim:1, text:'伴侣生气了不理你，你会——', opts:[

    emoji:'🌀',code:'WILD',tag:'倔强佛系型',name:'散漫外表下的全力以赴选手',
    css:'char-daihaok',img:'https://s.coze.cn/image/rOyQWetQWi4/',
    strength:'你是那种「无所谓啊都行」挂在嘴边的人，对日常小事的态度佛系到令人发指——吃什么？都行。去哪？随便。穿什么？看着办。但千万别以为你是真的什么都不在意，你只是把有限的能量留给了真正重要的人和事。\n\n你骨子里有一股不服输的倔劲，只是平时懒得亮出来。日常的你大大咧咧、不拘小节，但一旦触碰到你在意的事情——嗖的一下，佛系外衣脱掉，全力以赴的战斗模式启动。这种反差感让不了解你的人以为你在开玩笑，让了解你的人直呼「认真的K太可怕了」。你的纯粹善良是你最珍贵的底色，你对人的好从不带目的，就是单纯的觉得你值得。',

var currentQ = 0;
var answers = [];
var scores = {};

function initScores(){
  scores = {};
  var keys = Object.keys(RESULTS);
  for(var i=0;i<keys.length;i++) scores[keys[i]] = 0;
}

function showPage(id){
  var pages = document.querySelectorAll('.page');
  for(var i=0;i<pages.length;i++) pages[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startTest(){
  currentQ = 0;
  answers = [];
  initScores();
  renderQuestion();
  showPage('questionPage');
}

function renderQuestion(){
  var q = QUESTIONS[currentQ];
  var pct = (currentQ / 24 * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = (currentQ+1) + ' / 24';
  var dimEl = document.getElementById('qDimension');
  dimEl.textContent = DIMENSIONS[q.dim];
  dimEl.className = 'q-dimension dim-' + q.dim;
  document.getElementById('qText').textContent = q.text;
  var optWrap = document.getElementById('qOptions');
  optWrap.innerHTML = '';
  for(var i=0; i<q.opts.length; i++){
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.setAttribute('data-idx', i);
    btn.textContent = q.opts[i].text;
    (function(idx){
      btn.addEventListener('click', function(){ selectOption(idx); });
    })(i);
    optWrap.appendChild(btn);
  }
}

function selectOption(idx){
  var q = QUESTIONS[currentQ];
  var opt = q.opts[idx];
  var btns = document.querySelectorAll('.option-btn');
  for(var i=0;i<btns.length;i++){
    if(i === idx) btns[i].classList.add('selected');
    else btns[i].classList.remove('selected');
  }
  scores[opt.p] = (scores[opt.p] || 0) + 3;
  scores[opt.s] = (scores[opt.s] || 0) + 1;
  answers.push(idx);
  setTimeout(function(){
    currentQ++;
    if(currentQ < 24){ renderQuestion(); }
    else { showResult(); }
  }, 350);
}

function showResult(){
  var maxScore = 0, maxChar = '';
  var keys = Object.keys(scores);
  for(var i=0;i<keys.length;i++){
    if(scores[keys[i]] > maxScore){ maxScore = scores[keys[i]]; maxChar = keys[i]; }
  }
  var r = RESULTS[maxChar];
  var totalPossible = 24 * 3 + 24 * 1;
  var pct = Math.round(maxScore / totalPossible * 100);
  var matchPct = Math.min(98, Math.max(72, pct + 30));

  showPage('resultPage');
  var rp = document.getElementById('resultPage');
  rp.className = 'page result-page active ' + r.css;

  document.getElementById('resultBadge').textContent = r.tag;
  document.getElementById('resultImg').src = r.img;
  document.getElementById('resultCharName').textContent = maxChar;
  document.getElementById('resultCode').textContent = r.code;
  document.getElementById('resultTag').textContent = r.tag;
  document.getElementById('resultName').textContent = r.name;
  document.getElementById('resultPct').textContent = matchPct + '% 匹配度';

  var bar = document.getElementById('resultBar');
  bar.style.setProperty('--pct', matchPct + '%');
  bar.style.width = '0%';
  setTimeout(function(){ bar.style.width = matchPct + '%'; }, 100);

  document.getElementById('resultStrength').innerHTML = r.strength.replace(/\n/g, '<br>');
  document.getElementById('resultWeakness').innerHTML = r.weakness.replace(/\n/g, '<br>');

  var kwWrap = document.getElementById('resultKeywords');
  kwWrap.innerHTML = '';
  for(var i=0;i<r.keywords.length;i++){
    var span = document.createElement('span');
    span.className = 'keyword-tag';
    span.textContent = r.keywords[i];
    kwWrap.appendChild(span);
  }
}

function restartTest(){ startTest(); }

function shareResult(){
  var text = '我在鹅厂人格研究所测出了我的人格！快来测测你是哪只鹅~';
  if(navigator.share){
    navigator.share({title:'鹅厂人格研究所',text:text,url:location.href}).catch(function(){});
  } else {
    var el = document.createElement('textarea');
    el.value = text + location.href;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert('链接已复制，快去分享吧！');
  }
}

document.getElementById('startBtn').addEventListener('click', startTest);
document.getElementById('restartBtn').addEventListener('click', restartTest);
document.getElementById('shareBtn').addEventListener('click', shareResult);
</script>
